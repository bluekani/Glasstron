name: Build (Windows x64)

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      npm_config_msvs_version: "2022"
      npm_config_arch: "x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          architecture: "x64"
          cache: yarn

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build
        run: yarn build

      - name: Build dwm_exec.exe
        shell: cmd
        run: cl /nologo /O2 /EHsc /Fe:native\dwm_exec.exe src\native\win32_dwm\lib\exec.cpp /link user32.lib dwmapi.lib

      - name: Upload native addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: glasstron-native-win32-x64-node24
          path: |
            native/dwm.node
            native/dwm_exec.exe
          if-no-files-found: error
